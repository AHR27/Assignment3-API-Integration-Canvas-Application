<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>On-Demand Media Player</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }
        #videos {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        img {
            cursor: pointer;
            width: 200px;
            border-radius: 8px;
        }
        iframe {
            margin-top: 20px;
            width: 560px;
            height: 315px;
        }
    </style>
</head>
<body>

    <h2>YouTube Video Search</h2>

    <input type="text" id="searchInput" placeholder="Search videos..." />
    <button onclick="searchVideos()">Search</button>

    <br>

    <iframe id="player" src="" frameborder="0" allowfullscreen></iframe>

    <div id="videos"></div>

    <script src="script.js"></script>
</body>
</html>
